<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback - Health Monitor</title>
  <link rel="stylesheet" href="css/feedback.css">
</head>
<body>
  <header>
    <h1>📊 Health Monitor</h1>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="about.html">About</a>
      <a href="feedback.html">Feedback</a>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </nav>
  </header>

  <main>
    <h2>We’d love your feedback 💬</h2>
    <p>Your thoughts will help us improve Health Monitor and add the features that matter most to you.</p>
    <form id="feedbackForm">
	
      <label>
        Category:
        <select name="category" required>
          <option value="General">General</option>
          <option value="Bug">Bug</option>
          <option value="Feature Request">Feature Request</option>
          <option value="UI/UX">UI / Design</option>
          <option value="Metrics">Metrics Module</option>
          <option value="Trends">Trends / Charts</option>
          <option value="Alerts">Alerts</option>
          <option value="Symptoms">Symptoms Module</option>
          <option value="Devices">Fitbit / Withings</option>
        </select>
      </label>
	  
	  
      <textarea name="message" rows="6" placeholder="Write your feedback here..." required></textarea>
      <button type="submit">Submit Feedback</button>
    </form>
    <p id="feedbackMsg"></p>
  </main>
  
  <script src="js/feedback.js"></script>

</body>
</html>
